<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GT 이벤트 상세</title>
    <style>
        body { font-family: sans-serif; padding: 30px; }
        table { border-collapse: collapse; width: 600px; }
        th, td { border: 1px solid #ccc; padding: 10px 16px; text-align: left; }
        th { background: #f5f5f5; width: 160px; }
    </style>
</head>
<body>
<h2>GT 이벤트 상세 정보</h2>
<table>
    <tr><th>사건 번호</th>    <td th:text="${event.caseNumber}"></td></tr>
    <tr><th>발생 일시</th>    <td th:text="${#temporals.format(event.occurredAt, 'yyyy-MM-dd HH:mm:ss')}"></td></tr>
    <tr><th>발생 장소</th>    <td th:text="${event.latitude + ', ' + event.longitude}"></td></tr>
    <tr><th>방해 차량 번호</th><td th:text="${event.detectedPlate}"></td></tr>
    <tr><th>방해 지속 시간</th><td th:text="${event.exposureDuration + '초'}"></td></tr>
    <tr><th>채증 영상</th>    <td><a th:href="${event.videoPath}" target="_blank">영상 재생</a></td></tr>
    <tr><th>관제시스템 전송</th><td th:text="${event.sentToFire == 1 ? '완료' : '미전송'}"></td></tr>
    <tr><th>안전신문고 신고</th><td th:text="${event.sentToSafety == 1 ? '접수 완료' : '미신고'}"></td></tr>
    <tr><th>처리 상태</th>    <td th:text="${event.status}"></td></tr>
</table>
</body>
</html>
