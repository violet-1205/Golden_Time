<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${notice.title}"></title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
<div th:replace="~{layout/top :: top}"></div>

<div class="mx-auto flex min-h-[calc(100vh-56px)] max-w-7xl">
    <div class="hidden md:block">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
    </div>

    <div class="flex min-w-0 flex-1 flex-col">
        <main class="flex-1 p-6">
            <div class="rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
                <!-- 게시글 헤더 -->
                <div class="mb-6 border-b border-zinc-200 pb-6">
                    <h1 class="text-3xl font-bold tracking-tight" th:text="${notice.title}"></h1>
                    <div class="mt-4 flex items-center space-x-4 text-sm text-zinc-500">
                        <span>작성일: <span th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}"></span></span>
                        <span>조회수: <span th:text="${notice.viewCount}"></span></span>
                    </div>
                </div>

                <!-- 게시글 본문 -->
                <div class="prose max-w-none min-h-[200px] text-zinc-700 leading-relaxed" th:text="${notice.content}">
                    <!-- 내용이 여기에 렌더링됩니다. -->
                </div>

                <!-- 이미지 (있는 경우) - 깔끔하게 정렬 -->
                <div th:if="${notice.imagePath}" class="mt-12 flex justify-center">
                    <div class="relative max-w-2xl overflow-hidden rounded-xl border border-zinc-200 bg-zinc-50 shadow-md transition-shadow hover:shadow-lg">
                        <img th:src="${notice.imagePath}" alt="공지사항 이미지" class="h-auto w-full object-contain">
                    </div>
                </div>

                <!-- 버튼 그룹 -->
                <div class="mt-8 flex justify-between border-t border-zinc-200 pt-6">
                    <a th:href="@{/notices}" class="inline-flex items-center justify-center rounded-md border border-zinc-300 bg-white px-4 py-2 text-sm font-medium text-zinc-700 shadow-sm hover:bg-zinc-50">목록으로</a>
                    <div class="space-x-3">
                        <a th:href="@{/notices/{id}/edit(id=${notice.noticeId})}" class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700">수정</a>
                        <form th:action="@{/notices/{id}/delete(id=${notice.noticeId})}" method="post" class="inline-block">
                            <button type="submit" onclick="return confirm('정말로 삭제하시겠습니까?')" class="inline-flex items-center justify-center rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-red-700">삭제</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <div th:replace="~{layout/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
