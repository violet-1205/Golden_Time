<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
<div th:replace="~{layout/top :: top}"></div>

<div class="mx-auto flex min-h-[calc(100vh-56px)] max-w-7xl">
    <div class="hidden md:block">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
    </div>

    <div class="flex min-w-0 flex-1 flex-col">
        <main class="flex-1 p-6">
            <div class="rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
                <div class="mb-6 space-y-2">
                    <h1 class="text-2xl font-semibold tracking-tight">마이페이지</h1>
                    <p class="text-sm text-zinc-500">회원님의 개인 정보를 확인하고 수정할 수 있습니다.</p>
                </div>

                <div th:if="${param.success}" class="mb-6 p-4 rounded-md bg-emerald-50 text-emerald-700 text-sm border border-emerald-200">
                    회원 정보가 성공적으로 수정되었습니다.
                </div>

                <form th:action="@{/mypage}" th:object="${user}" method="post" class="max-w-2xl space-y-6">
                    <div>
                        <label for="userName" class="block text-sm font-medium text-zinc-700">이름</label>
                        <div class="mt-1">
                            <input type="text" id="userName" th:field="*{userName}" class="block w-full rounded-md border-zinc-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                        </div>
                    </div>

                    <div>
                        <label for="phone" class="block text-sm font-medium text-zinc-700">전화번호</label>
                        <div class="mt-1">
                            <input type="text" id="phone" th:field="*{phone}" class="block w-full rounded-md border-zinc-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                        </div>
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-zinc-700">이메일</label>
                        <div class="mt-1">
                            <input type="email" id="email" th:field="*{email}" class="block w-full rounded-md border-zinc-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                        </div>
                    </div>

                    <div>
                        <label for="address" class="block text-sm font-medium text-zinc-700">주소</label>
                        <div class="mt-1">
                            <input type="text" id="address" th:field="*{address}" class="block w-full rounded-md border-zinc-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                        </div>
                    </div>

                    <div class="pt-6 border-t border-zinc-100">
                        <h2 class="text-lg font-semibold text-zinc-800 mb-4">차량 정보</h2>
                        <div class="space-y-6">
                            <div th:each="vehicle, iterStat : *{vehicles}" class="p-4 rounded-lg bg-zinc-50 border border-zinc-200 space-y-4">
                                <input type="hidden" th:field="*{vehicles[__${iterStat.index}__].vehicleId}">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label th:for="'carNumber' + ${iterStat.index}" class="block text-sm font-medium text-zinc-700">차량 번호</label>
                                        <div class="mt-1">
                                            <input type="text" th:id="'carNumber' + ${iterStat.index}" th:field="*{vehicles[__${iterStat.index}__].carNumber}" class="block w-full rounded-md border-zinc-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm bg-white">
                                        </div>
                                    </div>
                                    <div>
                                        <label th:for="'serialNumber' + ${iterStat.index}" class="block text-sm font-medium text-zinc-700">단말기 시리얼</label>
                                        <div class="mt-1">
                                            <input type="text" th:id="'serialNumber' + ${iterStat.index}" th:field="*{vehicles[__${iterStat.index}__].serialNumber}" class="block w-full rounded-md border-zinc-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm bg-white">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div th:if="${#lists.isEmpty(user.vehicles)}" class="text-sm text-zinc-500 text-center py-4 italic">
                                등록된 차량 정보가 없습니다.
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-zinc-100">
                        <label for="password" class="block text-sm font-medium text-zinc-700">비밀번호 변경 (필요한 경우에만 입력)</label>
                        <div class="mt-1">
                            <input type="password" id="password" th:field="*{password}" class="block w-full rounded-md border-zinc-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="새 비밀번호">
                        </div>
                    </div>

                    <div class="flex justify-end pt-4">
                        <button type="submit" class="inline-flex items-center justify-center rounded-md bg-zinc-900 px-6 py-2 text-sm font-medium text-white shadow-sm transition-colors hover:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-zinc-500 focus:ring-offset-2">정보 수정하기</button>
                    </div>
                </form>
            </div>
        </main>

        <div th:replace="~{layout/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
