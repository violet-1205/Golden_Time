<aside th:fragment="sidebar" class="w-64 shrink-0 border-r border-zinc-200 bg-white">

        </div>
    </div>

    <nav class="px-2 pb-4 space-y-1">
        <a th:href="@{/}" 
           th:classappend="${currentUri == '/' ? 'bg-zinc-100 text-zinc-900' : 'text-zinc-700'}"
           class="flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium hover:bg-zinc-100 transition-colors">
            <span class="h-1.5 w-1.5 rounded-full" 
                  th:classappend="${currentUri == '/' ? 'bg-zinc-900' : 'bg-zinc-300'}"></span>
            메인화면

        <a th:href="@{/dashboard}" 
           th:classappend="${currentUri.startsWith('/dashboard') ? 'bg-zinc-100 text-zinc-900' : 'text-zinc-700'}"
           class="flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium hover:bg-zinc-100 transition-colors">
            <span class="h-1.5 w-1.5 rounded-full" 
                  th:classappend="${currentUri.startsWith('/dashboard') ? 'bg-zinc-900' : 'bg-zinc-300'}"></span>
            대시보드
        </a>
        <a th:href="@{/users}" 
           th:classappend="${currentUri.startsWith('/users') ? 'bg-zinc-100 text-zinc-900' : 'text-zinc-700'}"
           class="flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium hover:bg-zinc-100 transition-colors">
            <span class="h-1.5 w-1.5 rounded-full" 
                  th:classappend="${currentUri.startsWith('/users') ? 'bg-zinc-900' : 'bg-zinc-300'}"></span>
            회원 관리

        <a th:href="@{/mypage}" 
           th:classappend="${currentUri.startsWith('/mypage') ? 'bg-zinc-100 text-zinc-900' : 'text-zinc-700'}"
           class="flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium hover:bg-zinc-100 transition-colors">
            <span class="h-1.5 w-1.5 rounded-full" 
                  th:classappend="${currentUri.startsWith('/mypage') ? 'bg-zinc-900' : 'bg-zinc-300'}"></span>

        </a>
        <a th:href="@{/notices}" 
           th:classappend="${currentUri.startsWith('/notices') ? 'bg-zinc-100 text-zinc-900' : 'text-zinc-700'}"
           class="flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium hover:bg-zinc-100 transition-colors">

                  th:classappend="${currentUri.startsWith('/notices') ? 'bg-zinc-900' : 'bg-zinc-300'}"></span>
            공지사항

           class="flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-100 transition-colors">
            <span class="h-1.5 w-1.5 rounded-full bg-zinc-300"></span>
            문의게시판
        </a>
