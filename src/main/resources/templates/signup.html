<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
<main class="mx-auto flex min-h-screen max-w-lg flex-col justify-center px-6 py-12">
    <div class="rounded-lg border border-zinc-200 bg-white p-8 shadow-sm">
        <div class="mb-8 space-y-2 text-center">
            <h1 class="text-3xl font-bold tracking-tight">회원가입</h1>
            <p class="text-sm text-zinc-500">GoldenTime 서비스 이용을 위해 정보를 입력해주세요.</p>
        </div>

        <div th:if="${errorMessage}" class="mb-6 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700" th:text="${errorMessage}"></div>

        <form th:action="@{/signup}" th:object="${form}" method="post" class="space-y-6">
            <!-- 기본 정보 섹션 -->
            <div class="space-y-4">
                <h3 class="text-sm font-bold text-zinc-400 uppercase tracking-wider">기본 정보</h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label for="loginId" class="text-sm font-medium">아이디</label>
                        <input id="loginId" type="text" th:field="*{loginId}" required
                               class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
                        <div th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}" class="text-sm text-red-600"></div>
                    </div>

                    <div class="space-y-2">
                        <label for="password" class="text-sm font-medium">비밀번호</label>
                        <input id="password" type="password" th:field="*{password}" required
                               class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
                        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-sm text-red-600"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label for="userName" class="text-sm font-medium">이름</label>
                        <input id="userName" type="text" th:field="*{userName}" required
                               class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
                        <div th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="text-sm text-red-600"></div>
                    </div>

                    <div class="space-y-2">
                        <label for="phone" class="text-sm font-medium">전화번호</label>
                        <input id="phone" type="text" th:field="*{phone}"
                               class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="email" class="text-sm font-medium">이메일</label>
                    <input id="email" type="email" th:field="*{email}"
                           class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-sm text-red-600"></div>
                </div>

                <div class="space-y-2">
                    <label for="address" class="text-sm font-medium">주소</label>
                    <input id="address" type="text" th:field="*{address}"
                           class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
                </div>
            </div>

            <!-- 차량 정보 섹션 -->
            <div class="space-y-4 pt-4 border-t border-zinc-100">
                <h3 class="text-sm font-bold text-zinc-400 uppercase tracking-wider">차량 및 단말기 정보</h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label for="carNumber" class="text-sm font-medium">차량 번호</label>
                        <input id="carNumber" type="text" th:field="*{carNumber}" required placeholder="예: 12가 3456"
                               class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
                        <div th:if="${#fields.hasErrors('carNumber')}" th:errors="*{carNumber}" class="text-sm text-red-600"></div>
                    </div>

                    <div class="space-y-2">
                        <label for="serialNumber" class="text-sm font-medium">단말기 시리얼</label>
                        <input id="serialNumber" type="text" th:field="*{serialNumber}" required placeholder="단말기 고유 번호"
                               class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
                        <div th:if="${#fields.hasErrors('serialNumber')}" th:errors="*{serialNumber}" class="text-sm text-red-600"></div>
                    </div>
                </div>
            </div>

            <button type="submit"
                    class="inline-flex h-11 w-full items-center justify-center rounded-md bg-zinc-900 px-4 text-sm font-bold text-white shadow-sm transition-colors hover:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-zinc-300 disabled:pointer-events-none disabled:opacity-50">
                회원가입 완료
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-zinc-600">
            이미 계정이 있으신가요?
            <a th:href="@{/login}" class="font-medium text-zinc-900 underline underline-offset-4">로그인</a>
        </div>
    </div>
</main>
</body>
</html>
