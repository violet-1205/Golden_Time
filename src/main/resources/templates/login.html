<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
<main class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-6 py-12">
    <div class="rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
        <div class="mb-6 space-y-2">
            <h1 class="text-2xl font-semibold tracking-tight">로그인</h1>
            <p class="text-sm text-zinc-500">아이디와 비밀번호를 입력해주세요.</p>
        </div>

        <div class="space-y-3">
            <div th:if="${param.error}" class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
                아이디 또는 비밀번호가 올바르지 않습니다.
            </div>
            <div th:if="${param.logout}" class="rounded-md border border-zinc-200 bg-zinc-50 px-3 py-2 text-sm text-zinc-700">
                로그아웃되었습니다.
            </div>
            <div th:if="${param.signupSuccess}" class="rounded-md border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">
                회원가입이 완료되었습니다. 로그인 해주세요.
            </div>
        </div>

        <form th:action="@{/login}" method="post" class="mt-6 space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="space-y-2">
                <label for="username" class="text-sm font-medium">아이디</label>
                <input id="username" name="username" type="text" autocomplete="username" required
                       class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
            </div>

            <div class="space-y-2">
                <label for="password" class="text-sm font-medium">비밀번호</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required
                       class="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 py-2 text-sm shadow-sm outline-none focus:border-zinc-400 focus:ring-2 focus:ring-zinc-200">
            </div>

            <button type="submit"
                    class="inline-flex h-10 w-full items-center justify-center rounded-md bg-zinc-900 px-4 text-sm font-medium text-white shadow-sm transition-colors hover:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-zinc-300 disabled:pointer-events-none disabled:opacity-50">
                로그인
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-zinc-600">
            계정이 없으신가요?
            <a th:href="@{/signup}" class="font-medium text-zinc-900 underline underline-offset-4">회원가입</a>
        </div>
    </div>
</main>
</body>
</html>
