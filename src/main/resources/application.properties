spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:postgres}?characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=mbc
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=goldentime
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

server.port=1111

spring.datasource.hikari.connection-init-sql=SET client_encoding TO 'UTF8'

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# File Upload Settings
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Upload path
app.upload.path=static/images/

