<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 작성</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
<div th:replace="~{layout/top :: top}"></div>

<div class="mx-auto flex min-h-[calc(100vh-56px)] max-w-7xl">
    <div class="hidden md:block">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
    </div>

    <div class="flex min-w-0 flex-1 flex-col">
        <main class="flex-1 p-6">
            <div class="rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
                <h1 class="text-2xl font-semibold tracking-tight mb-6" th:text="${notice.title == null ? '새 공지사항 작성' : '공지사항 수정'}"></h1>

                <form th:action="${notice.noticeId != null} ? @{/notices/{id}(id=${notice.noticeId})} : @{/notices}" th:object="${notice}" method="post" enctype="multipart/form-data" class="space-y-6">
                    <input type="hidden" th:field="*{noticeId}" />

                    <div>
                        <label for="title" class="block text-sm font-medium text-zinc-700">제목</label>
                        <div class="mt-1">
                            <input type="text" id="title" th:field="*{title}" class="block w-full rounded-md border-zinc-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="제목을 입력하세요.">
                        </div>
                    </div>

                    <div>
                        <label for="imageFile" class="block text-sm font-medium text-zinc-700">이미지 첨부</label>
                        <div class="mt-1">
                            <input type="file" id="imageFile" th:field="*{imageFile}" class="block w-full text-sm text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-zinc-100 file:text-zinc-700 hover:file:bg-zinc-200">
                        </div>
                    </div>

                    <div>
                        <label for="content" class="block text-sm font-medium text-zinc-700">내용</label>
                        <div class="mt-1">
                            <textarea id="content" th:field="*{content}" rows="10" class="block w-full rounded-md border-zinc-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="내용을 입력하세요."></textarea>
                        </div>
                    </div>

                    <div class="flex justify-end space-x-3">
                        <a th:href="@{/notices}" class="inline-flex items-center justify-center rounded-md border border-zinc-300 bg-white px-4 py-2 text-sm font-medium text-zinc-700 shadow-sm hover:bg-zinc-50 focus:outline-none focus:ring-2 focus:ring-zinc-500 focus:ring-offset-2">취소</a>
                        <button type="submit" class="inline-flex items-center justify-center rounded-md bg-zinc-900 px-4 py-2 text-sm font-medium text-white shadow-sm transition-colors hover:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-zinc-500 focus:ring-offset-2">저장</button>
                    </div>
                </form>
            </div>
        </main>

        <div th:replace="~{layout/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
