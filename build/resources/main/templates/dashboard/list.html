<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - 주행 이벤트</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
<div th:replace="~{layout/top :: top}"></div>

<div class="mx-auto flex min-h-[calc(100vh-56px)] max-w-7xl">
    <div class="hidden md:block">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
    </div>

    <div class="flex min-w-0 flex-1 flex-col">
        <main class="flex-1 p-6">
            <div class="mb-6 flex justify-between items-end">
                <div class="space-y-2">
                    <h1 class="text-2xl font-semibold tracking-tight">대시보드</h1>
                    <p class="text-sm text-zinc-500">차량 주행 중 발생한 긴급 상황 및 이벤트 목록입니다.</p>
                </div>
                <button onclick="document.getElementById('uploadModal').classList.remove('hidden')" 
                        class="inline-flex items-center justify-center rounded-md bg-zinc-900 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-zinc-800 transition-colors">
                    영상 업로드
                </button>
            </div>

            <div class="rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-zinc-200">
                        <thead class="bg-zinc-50">
                            <tr>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-zinc-500 uppercase">ID</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-zinc-500 uppercase">차량번호</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-zinc-500 uppercase">인식 번호판</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-zinc-500 uppercase">상태</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-zinc-500 uppercase">OCR</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-zinc-500 uppercase">위치</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-zinc-500 uppercase">전송현황</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-zinc-500 uppercase">발생일시</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-zinc-500 uppercase">영상</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-zinc-200 bg-white">
                            <tr th:each="event : ${events}" class="hover:bg-zinc-50 transition-colors">
                                <td class="px-4 py-4 whitespace-nowrap text-sm text-zinc-500" th:text="${event.gtId}"></td>
                                <td class="px-4 py-4 whitespace-nowrap text-sm font-bold text-zinc-900" th:text="${event.carNumber}"></td>
                                <td class="px-4 py-4 whitespace-nowrap">
                                    <div th:if="${event.detectedPlate}" class="flex flex-col">
                                        <span class="text-sm font-bold text-blue-700" th:text="${event.detectedPlate}"></span>
                                        <span class="text-[10px] text-zinc-400" th:text="'신뢰도: ' + ${#numbers.formatPercent(event.confidence, 1, 1)}"></span>
                                    </div>
                                    <span th:unless="${event.detectedPlate}" class="text-xs text-zinc-300">분석 전</span>
                                </td>
                                <td class="px-4 py-4 whitespace-nowrap">
                                    <span th:if="${event.status == 'completed'}" class="inline-flex items-center rounded-full bg-emerald-50 px-2 py-1 text-xs font-medium text-emerald-700 ring-1 ring-inset ring-emerald-600/20">완료</span>
                                    <span th:if="${event.status == 'processing'}" class="inline-flex items-center rounded-full bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700 ring-1 ring-inset ring-blue-600/20 animate-pulse">처리중</span>
                                    <span th:unless="${event.status == 'completed' || event.status == 'processing'}" class="inline-flex items-center rounded-full bg-zinc-50 px-2 py-1 text-xs font-medium text-zinc-700 ring-1 ring-inset ring-zinc-600/20" th:text="${event.status}"></span>
                                </td>
                                <td class="px-4 py-4 whitespace-nowrap">
                                    <span th:if="${event.ocrAttempted}" class="text-xs font-medium text-blue-600">시도함</span>
                                    <span th:unless="${event.ocrAttempted}" class="text-xs text-zinc-400">-</span>
                                </td>
                                <td class="px-4 py-4 whitespace-nowrap text-xs text-zinc-500">
                                    <div th:text="'위도: ' + ${event.latitude}"></div>
                                    <div th:text="'경도: ' + ${event.longitude}"></div>
                                </td>
                                <td class="px-4 py-4 whitespace-nowrap">
                                    <div class="flex gap-1">
                                        <span th:if="${event.sentToFire}" class="px-1.5 py-0.5 rounded bg-red-50 text-[10px] font-bold text-red-600 border border-red-200">소방</span>
                                        <span th:if="${event.sentToSafety}" class="px-1.5 py-0.5 rounded bg-amber-50 text-[10px] font-bold text-amber-600 border border-amber-200">안전</span>
                                    </div>
                                </td>
                                <td class="px-4 py-4 whitespace-nowrap text-sm text-zinc-500" th:text="${#temporals.format(event.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                                <td class="px-4 py-4 whitespace-nowrap text-sm">
                                    <a th:if="${event.videoPath}" th:href="${event.videoPath}" target="_blank" class="text-blue-600 hover:underline font-medium">보기</a>
                                    <span th:unless="${event.videoPath}" class="text-zinc-300">없음</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(events)}">
                                <td colspan="8" class="px-6 py-12 text-center text-sm text-zinc-500">조회된 이벤트 데이터가 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <div th:replace="~{layout/footer :: footer}"></div>
    </div>
</div>

<!-- 영상 업로드 모달 -->
<div id="uploadModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div class="flex min-h-screen items-center justify-center p-4 text-center sm:p-0">
        <div class="fixed inset-0 bg-zinc-500 bg-opacity-75 transition-opacity" onclick="document.getElementById('uploadModal').classList.add('hidden')"></div>

        <div class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">
            <form th:action="@{/dashboard/upload}" th:object="${eventDto}" method="post" enctype="multipart/form-data">
                <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
                            <h3 class="text-lg font-semibold leading-6 text-zinc-900 mb-4">새 주행 영상 업로드</h3>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-zinc-700">대상 차량</label>
                                    <select th:field="*{vehicleId}" class="mt-1 block w-full rounded-md border-zinc-300 shadow-sm focus:border-zinc-500 focus:ring-zinc-500 sm:text-sm">
                                        <option value="">차량을 선택하세요</option>
                                        <option th:each="car : ${cars}" th:value="${car.vehicleId}" th:text="${car.carNumber} + ' (' + ${car.ownerName} + ')'"></option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-zinc-700">영상 파일</label>
                                    <input type="file" th:field="*{videoFile}" accept="video/*" class="mt-1 block w-full text-sm text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-zinc-100 file:text-zinc-700 hover:file:bg-zinc-200">
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-zinc-700">위도</label>
                                        <input type="number" step="0.0000000001" th:field="*{latitude}" placeholder="37.1234" class="mt-1 block w-full rounded-md border-zinc-300 shadow-sm focus:border-zinc-500 focus:ring-zinc-500 sm:text-sm">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-zinc-700">경도</label>
                                        <input type="number" step="0.0000000001" th:field="*{longitude}" placeholder="127.1234" class="mt-1 block w-full rounded-md border-zinc-300 shadow-sm focus:border-zinc-500 focus:ring-zinc-500 sm:text-sm">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-zinc-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                    <button type="submit" class="inline-flex w-full justify-center rounded-md bg-zinc-900 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-zinc-800 sm:ml-3 sm:w-auto">업로드 시작</button>
                    <button type="button" onclick="document.getElementById('uploadModal').classList.add('hidden')" class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-zinc-900 shadow-sm ring-1 ring-inset ring-zinc-300 hover:bg-zinc-50 sm:mt-0 sm:w-auto">취소</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
