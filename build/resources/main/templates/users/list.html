<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
<div th:replace="~{layout/top :: top}"></div>

<div class="mx-auto flex min-h-[calc(100vh-56px)] max-w-7xl">
    <div class="hidden md:block">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
    </div>

    <div class="flex min-w-0 flex-1 flex-col">
        <main class="flex-1 p-6">
            <div class="rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
                <div class="mb-6 space-y-2">
                    <h1 class="text-2xl font-semibold tracking-tight">회원 관리</h1>
                    <p class="text-sm text-zinc-500">시스템에 등록된 전체 회원 목록입니다. 사용자 행을 클릭하여 차량 정보를 확인하세요.</p>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-zinc-200">
                        <thead class="bg-zinc-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase tracking-wider">ID</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase tracking-wider">로그인 ID</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase tracking-wider">이름</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase tracking-wider">전화번호</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase tracking-wider">이메일</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase tracking-wider">권한</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase tracking-wider">가입일</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-zinc-200 bg-white" id="user-table-body">
                            <th:block th:each="user : ${users}">
                                <tr class="user-row hover:bg-zinc-50 transition-colors cursor-pointer" th:data-user-id="${user.userId}">
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-zinc-500" th:text="${user.userId}"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-zinc-900" th:text="${user.loginId}"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-zinc-900" th:text="${user.userName}"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-zinc-500" th:text="${user.phone}"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-zinc-500" th:text="${user.email}"></td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="inline-flex items-center rounded-full bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700 ring-1 ring-inset ring-blue-700/10" th:text="${user.role}"></span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-zinc-500" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                                </tr>
                            </th:block>
                            <!-- 데이터가 없을 경우 -->
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="7" class="px-6 py-12 text-center text-sm text-zinc-500">등록된 회원이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <div th:replace="~{layout/footer :: footer}"></div>
    </div>
</div>

<style>
    .vehicle-details-row {
        display: none;
    }
    .vehicle-details-cell {
        padding: 0 !important;
        background-color: #f9fafb; /* bg-zinc-50 */
        transition: all 0.3s ease-in-out;
        overflow: hidden;
    }
    .vehicle-details-content {
        padding: 1rem; /* p-4 */
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const userTableBody = document.getElementById('user-table-body');

    userTableBody.addEventListener('click', function(event) {
        const row = event.target.closest('.user-row');
        if (!row) return;

        const userId = row.dataset.userId;
        const existingDetailsRow = document.getElementById('vehicles-for-user-' + userId);

        if (existingDetailsRow) {
            existingDetailsRow.remove();
            return;
        }

        // Close any other open details
        const allDetailsRows = document.querySelectorAll('.vehicle-details-row');
        allDetailsRows.forEach(r => r.remove());

        fetch(`/users/${userId}/vehicles`)
            .then(response => response.json())
            .then(vehicles => {
                const detailsRow = document.createElement('tr');
                detailsRow.id = 'vehicles-for-user-' + userId;
                detailsRow.classList.add('vehicle-details-row');

                const detailsCell = document.createElement('td');
                detailsCell.colSpan = 7; // 전체 컬럼 수
                detailsCell.classList.add('vehicle-details-cell');

                let contentHtml = '<div class="vehicle-details-content">';
                if (vehicles.length > 0) {
                    contentHtml += `
                        <h4 class="text-md font-semibold mb-3 text-zinc-800">등록된 차량 (${vehicles.length}대)</h4>
                        <table class="min-w-full divide-y divide-zinc-300">
                            <thead class="bg-zinc-100">
                                <tr>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-zinc-600 uppercase">차량 번호</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-zinc-600 uppercase">단말기 시리얼</th>
                                    <th class="px-4 py-2 text-left text-xs font-medium text-zinc-600 uppercase">등록일</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-zinc-200">`;
                    vehicles.forEach(v => {
                        contentHtml += `
                            <tr>
                                <td class="px-4 py-3 text-sm font-bold text-zinc-900">${v.carNumber}</td>
                                <td class="px-4 py-3 text-sm text-zinc-600 font-mono">${v.serialNumber}</td>
                                <td class="px-4 py-3 text-sm text-zinc-500">${new Date(v.createdAt).toLocaleString('ko-KR')}</td>
                            </tr>`;
                    });
                    contentHtml += '</tbody></table>';
                } else {
                    contentHtml += '<p class="text-sm text-zinc-500 text-center py-4">이 사용자에게 등록된 차량이 없습니다.</p>';
                }
                contentHtml += '</div>';

                detailsCell.innerHTML = contentHtml;
                detailsRow.appendChild(detailsCell);
                row.after(detailsRow);

                // Force reflow to enable transition
                detailsRow.offsetHeight;
                detailsRow.style.display = 'table-row';
            })
            .catch(error => console.error('Error fetching vehicles:', error));
    });
});
</script>

</body>
</html>
